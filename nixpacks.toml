[phases.setup]
nixPkgs = ["libpng", "libjpeg", "freetype", "gd"]

[phases.install]
cmds = ["composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader", "npm ci"]

[phases.build]
cmds = ["npm run build", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"

[variables]
NODE_ENV = "production"
PHP_ENV = "production"
PHP_VERSION = "8.4"
